<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Web Notes</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header>
      <h1>Web Notes</h1>
      <input id="search" type="search" placeholder="Search all notes…" />
      <label><input type="checkbox" id="hide-done" /> hide completed</label>
      <label>Sort
        <select id="sort">
          <option value="manual">Manual</option>
          <option value="due">Due date</option>
          <option value="created">Created</option>
          <option value="alpha">Alphabetical</option>
        </select>
      </label>
      <span class="spacer"></span>
      <button id="export" class="btn">⬆ Export</button>
      <button id="import" class="btn">⬇ Import</button>
      <input id="import-file" type="file" accept="application/json" hidden />
      <button id="export-md" class="btn">⬇ .md</button>
      <label>Backup
        <select id="backup">
          <option value="off">Off</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
        </select>
      </label>
      <label>Theme
        <select id="theme">
          <option value="auto">Auto</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
      <span class="sync-hint" title="Export a backup here, then Import → Merge on another device to sync.">↔ sync via Export/Import</span>
    </header>
    <div class="layout">
      <nav id="rail"></nav>
      <main id="tree"></main>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
